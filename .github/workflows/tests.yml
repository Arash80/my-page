name: Flask Tests

on:
  push:
    paths:
      - "main.py"
      - "forms.py"
      - "content.py"
      - "templates/**"
      - "static/**"
      - "tests/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/tests.yml"

  pull_request:
    paths:
      - "main.py"
      - "forms.py"
      - "content.py"
      - "templates/**"
      - "static/**"
      - "tests/**"
      - "requirements.txt"
      - "requirements-dev.txt"
      - ".github/workflows/tests.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: python -m pip install -r requirements-dev.txt

      - run: pytest